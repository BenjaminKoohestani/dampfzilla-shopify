<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Age-Gated Vape Store</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            background: linear-gradient(to bottom, #00BFFF, #1E90FF);
            color: white;
        }
        header {
            background: #333;
            padding: 10px;
            text-align: center;
        }
        h1 {
            margin: 0;
        }
        .age-gate {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(5px);
            border-radius: 10px;
            padding: 20px;
            box-shadow: 0 0 15px rgba(0, 0, 0, 0.5);
        }
        .age-gate input {
            padding: 10px;
            margin: 10px;
            border-radius: 5px;
            border: none;
        }
        .age-gate button {
            padding: 10px 20px;
            background: #1E90FF;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }
        .age-gate button:hover {
            background: #00BFFF;
        }
    </style>
</head>
<body>
    <header>
        <h1>Welcome to Our Vape Store</h1>
    </header>
    <div class="age-gate">
        <h2>Age Verification</h2>
        <p>Please enter your age to proceed.</p>
        <input type="number" placeholder="Enter your age" id="age">
        <button onclick="verifyAge()">Verify</button>
    </div>
    <script>
        function verifyAge() {
            var age = document.getElementById('age').value;
            if (age >= 18) {
                window.location.href = 'store.html'; // Redirect to the main store page
            } else {
                alert('You must be at least 18 years old to enter.');
            }
        }
    </script>
</body>
</html>
